<!doctype html>
<html lang="zh">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>自选股</title>
        <link rel="stylesheet" href="common.css" />
        <style>
            /* ---- Full-width override ---- */
            body {
                width: 100%;
            }
            .main {
                padding: unset !important;
                gap: unset !important;
                max-width: unset !important;
                width: 100% !important;
            }

            /* ---- Watchlist panel ---- */
            .watchlist-panel {
                width: 320px;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .wl-search {
                padding: 12px 16px;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
                display: flex;
                gap: 8px;
            }
            .wl-search input {
                flex: 1;
            }
            .wl-add-status {
                padding: 6px 16px;
                border-bottom: 1px solid var(--border);
                font-size: 12px;
                color: var(--text2);
                background: var(--primary-light);
                flex-shrink: 0;
                display: none;
            }
            .wl-add-status.show { display: block; }
            .wl-list {
                flex: 1;
                overflow-y: auto;
                font-size: 13px;
            }
            .wl-item {
                padding: 10px 16px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                transition: background 0.1s;
            }
            .wl-item:last-child {
                border-bottom: none;
            }
            .wl-item:hover {
                background: var(--primary-light);
            }
            .wl-item.selected {
                background: var(--primary);
                color: #fff;
            }
            .wl-item .wl-info {
                flex: 1;
                min-width: 0;
            }
            .wl-item .wl-name {
                font-weight: 600;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .wl-item .wl-meta {
                font-size: 11px;
                color: var(--text2);
                margin-top: 2px;
                display: flex;
                gap: 6px;
                align-items: center;
            }
            .wl-item .wl-price {
                font-weight: 600;
                font-size: 13px;
            }
            .wl-item .wl-chg {
                font-size: 11px;
            }
            .wl-item .up {
                color: var(--up);
            }
            .wl-item .down {
                color: var(--down);
            }
            .wl-item.selected .wl-price,
            .wl-item.selected .wl-chg,
            .wl-item.selected .wl-cap {
                color: rgba(255, 255, 255, 0.85);
            }
            .wl-item .wl-cap {
                margin-left: auto;
                font-size: 11px;
                color: var(--text2);
            }
            .wl-item.selected .wl-cap {
                color: rgba(255, 255, 255, 0.6);
            }
            .wl-item.selected .wl-meta {
                color: rgba(255, 255, 255, 0.7);
            }
            .wl-item .wl-del {
                margin-left: auto;
                flex-shrink: 0;
                font-size: 12px;
                color: var(--text2);
                cursor: pointer;
                opacity: 0;
                transition: opacity 0.15s, color 0.15s;
                padding: 2px 4px;
                border-radius: 4px;
            }
            .wl-item:hover .wl-del {
                opacity: 1;
            }
            .wl-item .wl-del:hover {
                color: var(--up);
            }
            .wl-item.selected .wl-del {
                color: rgba(255, 255, 255, 0.6);
                opacity: 1;
            }
            .wl-item.selected .wl-del:hover {
                color: #fff;
            }
            .wl-empty {
                padding: 40px 20px;
                text-align: center;
                color: var(--text2);
                font-size: 14px;
            }

            /* ---- Chart (center, fills remaining) ---- */
            .detail {
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                border-radius: 0;
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
            }
            .chart-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 16px;
                background: var(--chart-bar-bg);
                font-size: 13px;
                color: var(--text2);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
            }
            .chart-bar .stock-name {
                font-weight: 600;
                color: var(--text);
                font-size: 14px;
            }
            .chart-bar button {
                padding: 3px 10px;
                font-size: 12px;
            }
            .chart-container {
                flex: 1;
                min-height: 0;
            }
            .empty-detail {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text2);
                font-size: 14px;
            }

            /* ---- Notes panel ---- */
            .notes-panel {
                height: 100%;
                width: 320px;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .notes-header {
                padding: 10px 16px;
                background: var(--chart-bar-bg);
                border-bottom: 1px solid var(--border);
                font-size: 13px;
                font-weight: 600;
                color: var(--text2);
                flex-shrink: 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .notes-header .stock-label {
                color: var(--text);
                font-weight: 700;
            }
            #notesContent {
                height: 100%;
            }
            .notes-editor {
                flex: 1;
                padding: 0;
                display: flex;
                height: 100%;
                flex-direction: column;
            }
            .notes-editor textarea {
                flex: 1;
                width: 100%;
                padding: 12px 16px;
                border: none;
                outline: none;
                resize: none;
                font-size: 13px;
                line-height: 1.6;
                font-family: inherit;
                color: var(--text);
                background: var(--card);
            }
            .notes-empty {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text2);
                font-size: 13px;
                padding: 20px;
            }

            /* ---- Mobile tab bar (hidden on desktop) ---- */
            .mobile-tabs {
                display: none;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 50px;
                background: var(--card);
                border-top: 1px solid var(--border);
                z-index: 100;
                align-items: center;
                justify-content: space-around;
            }
            .mobile-tab {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 2px;
                font-size: 10px;
                color: var(--text2);
                cursor: pointer;
                padding: 4px 0;
                transition: color 0.15s;
                user-select: none;
            }
            .mobile-tab svg {
                width: 20px;
                height: 20px;
            }
            .mobile-tab.active {
                color: var(--primary);
            }

            /* ---- Mobile responsive ---- */
            @media (max-width: 768px) {
                .header {
                    padding: 12px 16px;
                    height: 52px;
                    gap: 10px;
                }
                .header h1 { font-size: 16px; }
                .header .mobile-hide { display: none; }
                .main {
                    padding-bottom: 50px;
                }
                .mobile-tabs {
                    display: flex;
                }
                .watchlist-panel,
                .detail,
                .notes-panel {
                    width: 100% !important;
                    border-left: none !important;
                    border-right: none !important;
                }
                .main {
                    flex-direction: column;
                    height: auto;
                    overflow: visible;
                }
                .watchlist-panel,
                .detail,
                .notes-panel {
                    display: none;
                }
                .main.tab-list .watchlist-panel,
                .main.tab-chart .detail,
                .main.tab-notes .notes-panel {
                    display: flex;
                }
                .main.tab-chart .detail {
                    min-height: calc(100vh - 52px - 50px);
                }
                .chart-container {
                    min-height: calc(100vh - 52px - 50px - 40px);
                }
                .wl-item .wl-del {
                    opacity: 1;
                }
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>自选股</h1>
            <a href="index.html">← 返回首页</a>
            <a
                href="Institutional_Holdings.html"
                class="type-badge mobile-hide"
                style="font-size: 13px; padding: 5px 12px"
                >机构持仓</a
            >
            <div style="flex: 1"></div>
            <button onclick="importBackup()" class="mobile-hide" style="font-size:12px;padding:5px 12px">导入</button>
            <button onclick="exportBackup()" class="mobile-hide" style="font-size:12px;padding:5px 12px">备份</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
            <button
                class="theme-btn"
                onclick="toggleTheme()"
                id="themeBtn"
                title="切换主题"
            ></button>
        </div>

        <div class="main">
            <!-- col 1: watchlist -->
            <div
                class="watchlist-panel card"
                style="padding: 0; overflow: hidden; border-radius: 0"
            >
                <div class="wl-search">
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="搜索或输入代码添加..."
                        oninput="renderWatchlist()"
                        onkeydown="if(event.key==='Enter')addStock()"
                    />
                    <button onclick="addStock()" style="padding:6px 12px;font-size:12px">添加</button>
                </div>
                <div class="wl-add-status" id="addStatus"></div>
                <div class="wl-list" id="wlList"></div>
                <div class="wl-empty" id="wlEmpty">
                    暂无自选股，可从机构持仓页面添加
                </div>
            </div>

            <!-- col 2: chart -->
            <div
                class="detail card"
                style="padding: 0; overflow: hidden; border-radius: 0"
            >
                <div
                    id="chartArea"
                    style="
                        display: none;
                        flex: 1;
                        flex-direction: column;
                        min-height: 0;
                    "
                >
                    <div class="chart-bar">
                        <span class="stock-name" id="chartStockName"></span>
                        <div
                            style="display: flex; gap: 8px; align-items: center"
                        >
                            <a
                                id="f10Link"
                                href="#"
                                target="_blank"
                                class="f10-link"
                                >F10</a
                            >
                            <button onclick="deselectStock()">收起</button>
                        </div>
                    </div>
                    <div class="chart-container" id="tvChartContainer"></div>
                </div>
                <div class="empty-detail" id="emptyDetail">
                    选择左侧股票查看行情图表
                </div>
            </div>

            <!-- col 3: notes -->
            <div
                class="notes-panel card"
                style="padding: 0; overflow: hidden; border-radius: 0"
            >
                <div id="notesContent">
                    <div class="notes-empty" id="notesEmpty">
                        选择股票后记录笔记
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile tab bar -->
        <div class="mobile-tabs" id="mobileTabs">
            <div class="mobile-tab active" onclick="switchTab('list')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                <span>自选</span>
            </div>
            <div class="mobile-tab" onclick="switchTab('chart')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span>图表</span>
            </div>
            <div class="mobile-tab" onclick="switchTab('notes')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>笔记</span>
            </div>
            <div class="mobile-tab" onclick="switchTab('more')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                <span>更多</span>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <script src="common.js"></script>
        <script src="https://s3.tradingview.com/tv.js"></script>
        <script>
            const wlList = document.getElementById("wlList");
            const searchInput = document.getElementById("searchInput");
            let selectedCode = "";
            let tvWidget = null;
            let saveTimer = null;

            // ---- Notes (getNote/saveNote from common.js) ----

            function renderNotesPanel(secucode) {
                const content = document.getElementById("notesContent");
                if (!secucode) {
                    content.innerHTML =
                        '<div class="notes-empty">选择股票后记录笔记</div>';
                    return;
                }
                const [code] = secucode.split(".");
                const note = getNote(secucode);
                content.innerHTML = `
                    <div class="notes-header">
                        <span>笔记 <span class="stock-label">${code}</span></span>
                        <span style="font-weight:400;font-size:11px" id="noteStatus"></span>
                    </div>
                    <div class="notes-editor">
                        <textarea id="noteTextarea" placeholder="在此记录分析笔记...&#10;&#10;支持多行文本，自动保存"
                            oninput="onNoteInput()">${note}</textarea>
                    </div>`;
            }

            function onNoteInput() {
                clearTimeout(saveTimer);
                const status = document.getElementById("noteStatus");
                if (status) status.textContent = "编辑中...";
                saveTimer = setTimeout(() => {
                    const textarea = document.getElementById("noteTextarea");
                    if (textarea && selectedCode) {
                        saveNote(selectedCode, textarea.value);
                        const s = document.getElementById("noteStatus");
                        if (s) s.textContent = "已保存";
                        setTimeout(() => {
                            if (s) s.textContent = "";
                        }, 1500);
                    }
                }, 500);
            }

            // ---- Toast ----
            let toastTimer;
            function showToast(msg) {
                const el = document.getElementById("toast");
                el.textContent = msg;
                el.classList.add("show");
                clearTimeout(toastTimer);
                toastTimer = setTimeout(
                    () => el.classList.remove("show"),
                    1500,
                );
            }

            // ---- Format helpers ----
            function fmtPrice(v) {
                if (v == null || isNaN(v)) return "--";
                return v.toFixed(2);
            }
            function fmtCap(v) {
                if (!v) return "--";
                if (v >= 10000) return (v / 10000).toFixed(1) + "万亿";
                return v.toFixed(1) + "亿";
            }

            // ---- Batch fetch quotes ----
            async function batchFetchQuotes(codes) {
                if (!codes.length) return {};
                // Check cache first, collect misses
                const cached = {};
                const miss = [];
                for (const c of codes) {
                    const d = cacheGet("info2_" + c);
                    if (d) cached[c] = d;
                    else miss.push(c);
                }
                if (miss.length) {
                    const keys = miss.map(c => codeToTencentKey(c)).join(",");
                    const resp = await fetch(`https://qt.gtimg.cn/q=${keys}`);
                    const buf = await resp.arrayBuffer();
                    const text = new TextDecoder("gbk").decode(buf);
                    for (const line of text.split(";")) {
                        const m = line.match(/"(.+)"/);
                        if (!m) continue;
                        const p = m[1].split("~");
                        if (p.length < 10) continue;
                        const info = {
                            code: p[2], name: p[1],
                            price: parseFloat(p[3]),
                            change: parseFloat(p[4]),
                            changePct: parseFloat(p[5]),
                            marketCap: p[9] ? parseFloat(p[9]) : null,
                        };
                        cached[info.code] = info;
                        cacheSet("info2_" + info.code, info);
                    }
                }
                return cached;
            }

            // ---- Watchlist ----
            let quotesMap = {};
            async function renderWatchlist() {
                const kw = searchInput.value.trim().toLowerCase();
                let list = getWatchlist();
                if (kw)
                    list = list.filter(
                        (s) =>
                            s.name.toLowerCase().includes(kw) ||
                            s.secucode.includes(kw),
                    );

                document.getElementById("wlEmpty").style.display = list.length
                    ? "none"
                    : "block";
                wlList.innerHTML = "";

                // Fetch quotes for all visible stocks
                const codes = list.map(s => s.secucode.split(".")[0]);
                quotesMap = await batchFetchQuotes(codes);

                for (const s of list) {
                    const [code] = s.secucode.split(".");
                    const board = getBoardLabel(code);
                    const q = quotesMap[code] || {};
                    const priceHtml = q.price != null
                        ? `<span class="wl-price ${q.change >= 0 ? "up" : "down"}">${fmtPrice(q.price)}</span>
                           <span class="wl-chg ${q.change >= 0 ? "up" : "down"}">${q.changePct >= 0 ? "+" : ""}${q.changePct.toFixed(2)}%</span>`
                        : "";
                    const capHtml = q.marketCap != null
                        ? `<span class="wl-cap">${fmtCap(q.marketCap)}</span>`
                        : "";

                    const div = document.createElement("div");
                    div.className =
                        "wl-item" +
                        (s.secucode === selectedCode ? " selected" : "");
                    div.innerHTML = `
                        <div class="wl-info">
                            <div class="wl-name">${s.name}</div>
                            <div class="wl-meta">
                                <span>${code}</span>
                                <span class="type-badge">${board}</span>
                                ${priceHtml}${capHtml}
                            </div>
                        </div>
                        <span class="wl-del" title="删除">✕</span>`;
                    div.querySelector(".wl-del").addEventListener(
                        "click",
                        (e) => {
                            e.stopPropagation();
                            removeStock(s);
                        },
                    );
                    div.addEventListener("click", () => selectStock(s));
                    wlList.appendChild(div);
                }
            }

            function removeStock(s) {
                toggleWatchlist(s.secucode, s.name, s.market);
                showToast(`已将 ${s.name} 移出自选`);
                if (selectedCode === s.secucode) deselectStock();
                renderWatchlist(); // async but no need to await
            }

            function selectStock(s) {
                selectedCode = s.secucode;
                renderWatchlist();

                // Mobile: auto-switch to chart tab
                if (window.innerWidth <= 768) {
                    switchTab("chart");
                }

                const symbol = secucodeToSymbol(s.secucode);
                if (!symbol) return;

                const [code] = s.secucode.split(".");
                document.getElementById("chartStockName").textContent =
                    `${s.name} (${code})`;
                document.getElementById("f10Link").href = codeToF10Url(
                    s.secucode,
                );
                document.getElementById("emptyDetail").style.display = "none";

                const chartArea = document.getElementById("chartArea");
                chartArea.style.display = "flex";

                const container = document.getElementById("tvChartContainer");
                container.innerHTML = "";

                tvWidget = new TradingView.widget({
                    autosize: true,
                    symbol,
                    interval: "D",
                    timezone: "Asia/Shanghai",
                    theme: getTheme(),
                    style: "1",
                    locale: "zh_CN",
                    enable_publishing: false,
                    allow_symbol_change: true,
                    container_id: "tvChartContainer",
                    hide_side_toolbar: false,
                    studies: ["MASimple@tv-basicstudies"],
                });

                renderNotesPanel(s.secucode);
            }

            function deselectStock() {
                selectedCode = "";
                document.getElementById("chartArea").style.display = "none";
                document.getElementById("tvChartContainer").innerHTML = "";
                document.getElementById("emptyDetail").style.display = "flex";
                tvWidget = null;
                renderNotesPanel(null);
                renderWatchlist();
            }

            // ---- Stock info (Tencent API) ----
            function codeToTencentKey(code) {
                const c = String(code);
                if (c.startsWith("6") || c.startsWith("900")) return "s_sh" + c;
                if (c.startsWith("8") || c.startsWith("43")) return "s_bj" + c;
                return "s_sz" + c;
            }

            function codeToMarket(code) {
                const c = String(code);
                if (c.startsWith("6") || c.startsWith("688") || c.startsWith("900")) return "SH";
                if (c.startsWith("8") || c.startsWith("43")) return "BJ";
                return "SZ";
            }

            async function fetchStockInfo(code) {
                const cacheKey = "info2_" + code;
                const cached = cacheGet(cacheKey);
                if (cached) return cached;

                const key = codeToTencentKey(code);
                const resp = await fetch(`https://qt.gtimg.cn/q=${key}`);
                const buf = await resp.arrayBuffer();
                const text = new TextDecoder("gbk").decode(buf);
                // Parse: v_s_sh600519="1~贵州茅台~600519~1332.95~..."
                const match = text.match(/"(.+)"/);
                if (!match) return null;

                const parts = match[1].split("~");
                if (parts.length < 7) return null;

                const info = {
                    code: parts[2],
                    name: parts[1],
                    price: parseFloat(parts[3]),
                    change: parseFloat(parts[4]),
                    changePct: parseFloat(parts[5]),
                    volume: parseInt(parts[6]),
                    amount: parseFloat(parts[7]),
                    marketCap: parts[9] ? parseFloat(parts[9]) : null,
                };
                cacheSet(cacheKey, info);
                return info;
            }

            // ---- Add stock by code ----
            async function addStock() {
                const input = document.getElementById("searchInput");
                let code = input.value.trim();
                if (!code) return;
                input.value = "";

                const statusEl = document.getElementById("addStatus");
                statusEl.textContent = "查询中...";
                statusEl.classList.add("show");

                try {
                    code = code.replace(/\D/g, "");
                    if (!/^\d{6}$/.test(code)) throw new Error("请输入6位股票代码");

                    const market = codeToMarket(code);
                    const secucode = `${code}.${market}`;

                    if (isInWatchlist(secucode)) throw new Error("该股票已在自选中");

                    const info = await fetchStockInfo(code);
                    if (!info || !info.name) throw new Error("未找到该股票");

                    toggleWatchlist(secucode, info.name, market);
                    renderWatchlist();
                    showToast(`已添加 ${info.name}`);
                    statusEl.textContent = `✓ ${info.name} 已添加`;
                    statusEl.style.color = "var(--down)";
                    setTimeout(() => {
                        statusEl.classList.remove("show");
                        statusEl.style.color = "";
                    }, 1500);
                } catch (e) {
                    statusEl.textContent = e.message || "添加失败";
                    statusEl.style.color = "var(--up)";
                    setTimeout(() => {
                        statusEl.classList.remove("show");
                        statusEl.style.color = "";
                    }, 2000);
                }
            }

            // ---- Backup & Import ----
            function exportBackup() {
                const data = {
                    version: 1,
                    exportedAt: new Date().toISOString(),
                    watchlist: getWatchlist(),
                    notes: JSON.parse(localStorage.getItem(NOTES_KEY) || "{}"),
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                const d = new Date();
                const ts = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
                a.download = `自选股备份_${ts}.json`;
                a.click();
                URL.revokeObjectURL(a.href);
                showToast("备份文件已下载");
            }

            function importBackup() {
                document.getElementById("importFile").click();
            }

            function handleImport(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (!data.watchlist || !Array.isArray(data.watchlist)) {
                            throw new Error("无效的备份文件");
                        }
                        // Merge watchlist: add missing stocks
                        const existing = getWatchlist();
                        const existSet = new Set(existing.map(s => s.secucode));
                        let added = 0;
                        for (const s of data.watchlist) {
                            if (!existSet.has(s.secucode)) {
                                existing.push(s);
                                added++;
                            }
                        }
                        saveWatchlist(existing);

                        // Merge notes
                        const importedNotes = data.notes || {};
                        let allNotes; try { allNotes = JSON.parse(localStorage.getItem(NOTES_KEY) || "{}"); } catch { allNotes = {}; }
                        let noteAdded = 0;
                        for (const [k, v] of Object.entries(importedNotes)) {
                            if (!allNotes[k]) { allNotes[k] = v; noteAdded++; }
                        }
                        localStorage.setItem(NOTES_KEY, JSON.stringify(allNotes));

                        renderWatchlist();
                        if (selectedCode) renderNotesPanel(selectedCode);
                        showToast(`已导入 ${added} 只股票, ${noteAdded} 条笔记`);
                    } catch (err) {
                        showToast("导入失败: " + (err.message || "文件格式错误"));
                    }
                };
                reader.readAsText(file);
                event.target.value = ""; // reset for re-import
            }

            // ---- Mobile tab switching ----
            let currentTab = "list";
            function switchTab(tab) {
                if (tab === "more") {
                    // Show action sheet for backup/import
                    if (confirm("选择操作：\n确定 = 备份导出\n取消 = 导入数据")) {
                        exportBackup();
                    } else {
                        importBackup();
                    }
                    return;
                }
                currentTab = tab;
                const main = document.querySelector(".main");
                main.classList.remove("tab-list", "tab-chart", "tab-notes");
                main.classList.add("tab-" + tab);

                // Update tab bar active state
                document.querySelectorAll(".mobile-tab").forEach((el, i) => {
                    const tabs = ["list", "chart", "notes", "more"];
                    el.classList.toggle("active", tabs[i] === tab);
                });

                // Auto-select first stock when switching to chart/notes on mobile
                if (tab === "chart" || tab === "notes") {
                    if (!selectedCode) {
                        const list = getWatchlist();
                        if (list.length) selectStock(list[0]);
                    }
                }

                // Re-render chart if switching to chart tab (widget needs visible container)
                if (tab === "chart" && selectedCode) {
                    setTimeout(() => {
                        const container = document.getElementById("tvChartContainer");
                        if (container) {
                            const iframe = container.querySelector("iframe");
                            if (iframe) {
                                // Trigger resize
                                window.dispatchEvent(new Event("resize"));
                            }
                        }
                    }, 100);
                }
            }

            // ---- Init ----
            renderWatchlist();
        </script>
    </body>
</html>
