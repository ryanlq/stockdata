<!doctype html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <title>自选股</title>
    <link rel="stylesheet" href="common.css" />
    <style>
        /* ---- Left list ---- */
        .watchlist-panel {
            width: 320px; flex-shrink: 0; display: flex; flex-direction: column;
            overflow: hidden;
        }
        .wl-search {
            padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .wl-search input { width: 100%; }
        .wl-list { flex: 1; overflow-y: auto; font-size: 13px; }
        .wl-item {
            padding: 10px 16px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; transition: background .1s;
        }
        .wl-item:last-child { border-bottom: none; }
        .wl-item:hover { background: var(--primary-light); }
        .wl-item.selected { background: var(--primary); color: #fff; }
        .wl-item .wl-info { flex: 1; min-width: 0; }
        .wl-item .wl-name {
            font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .wl-item .wl-meta {
            font-size: 11px; color: var(--text2); margin-top: 2px;
            display: flex; gap: 6px; align-items: center;
        }
        .wl-item.selected .wl-meta { color: rgba(255,255,255,.7); }
        .wl-item .star { margin-left: auto; flex-shrink: 0; }
        .wl-empty {
            padding: 40px 20px; text-align: center; color: var(--text2); font-size: 14px;
        }

        /* ---- Right: chart fills everything ---- */
        .detail { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
        .chart-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 16px; background: var(--chart-bar-bg); font-size: 13px; color: var(--text2);
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .chart-bar .stock-name { font-weight: 600; color: var(--text); font-size: 14px; }
        .chart-bar button { padding: 3px 10px; font-size: 12px; }
        .chart-container { flex: 1; min-height: 0; }
        .empty-detail {
            flex: 1; display: flex; align-items: center; justify-content: center;
            color: var(--text2); font-size: 14px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>自选股</h1>
    <a href="index.html">← 返回首页</a>
    <a href="Institutional_Holdings.html" class="type-badge" style="font-size:13px;padding:5px 12px">机构持仓</a>
    <div style="flex:1"></div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题"></button>
</div>

<div class="main">
    <!-- left: watchlist -->
    <div class="watchlist-panel card" style="padding:0;overflow:hidden">
        <div class="wl-search">
            <input type="text" id="searchInput" placeholder="搜索股票名称或代码..." oninput="renderWatchlist()" />
        </div>
        <div class="wl-list" id="wlList"></div>
        <div class="wl-empty" id="wlEmpty">暂无自选股，可从机构持仓页面添加</div>
    </div>

    <!-- right: chart -->
    <div class="detail card" style="padding:0;overflow:hidden">
        <div id="chartArea" style="display:none;flex:1;flex-direction:column;min-height:0">
            <div class="chart-bar">
                <span class="stock-name" id="chartStockName"></span>
                <div style="display:flex;gap:8px;align-items:center">
                    <a id="f10Link" href="#" target="_blank" class="f10-link">F10</a>
                    <button onclick="deselectStock()">收起</button>
                </div>
            </div>
            <div class="chart-container" id="tvChartContainer"></div>
        </div>
        <div class="empty-detail" id="emptyDetail">选择左侧股票查看行情图表</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="common.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const wlList = document.getElementById("wlList");
const searchInput = document.getElementById("searchInput");
let selectedCode = "";
let tvWidget = null;

// ---- Toast ----
let toastTimer;
function showToast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg; el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), 1500);
}

// ---- Render watchlist ----
function renderWatchlist() {
    const kw = searchInput.value.trim().toLowerCase();
    let list = getWatchlist();
    if (kw) list = list.filter(s => s.name.toLowerCase().includes(kw) || s.secucode.includes(kw));

    document.getElementById("wlEmpty").style.display = list.length ? "none" : "block";
    wlList.innerHTML = "";

    for (const s of list) {
        const [code] = s.secucode.split(".");
        const board = getBoardLabel(code);
        const div = document.createElement("div");
        div.className = "wl-item" + (s.secucode === selectedCode ? " selected" : "");
        div.innerHTML = `
            <div class="wl-info">
                <div class="wl-name">${s.name}</div>
                <div class="wl-meta">
                    <span>${code}</span>
                    <span class="type-badge">${board}</span>
                </div>
            </div>
            <span class="star on" title="移出自选">★</span>`;
        div.querySelector(".star").addEventListener("click", e => { e.stopPropagation(); removeStock(s); });
        div.addEventListener("click", e => { if (!e.target.classList.contains("star")) selectStock(s); });
        wlList.appendChild(div);
    }
}

function removeStock(s) {
    toggleWatchlist(s.secucode, s.name, s.market);
    showToast(`已将 ${s.name} 移出自选`);
    if (selectedCode === s.secucode) deselectStock();
    renderWatchlist();
}

function selectStock(s) {
    selectedCode = s.secucode;
    renderWatchlist();

    const symbol = secucodeToSymbol(s.secucode);
    if (!symbol) return;

    const [code] = s.secucode.split(".");
    document.getElementById("chartStockName").textContent = `${s.name} (${code})`;
    document.getElementById("f10Link").href = codeToF10Url(s.secucode);
    document.getElementById("emptyDetail").style.display = "none";

    const chartArea = document.getElementById("chartArea");
    chartArea.style.display = "flex";

    const container = document.getElementById("tvChartContainer");
    container.innerHTML = "";

    tvWidget = new TradingView.widget({
        autosize: true, symbol, interval: "D", timezone: "Asia/Shanghai",
        theme: getTheme(), style: "1", locale: "zh_CN", enable_publishing: false,
        allow_symbol_change: true, container_id: "tvChartContainer",
        hide_side_toolbar: false, studies: ["MASimple@tv-basicstudies"],
    });
}

function deselectStock() {
    selectedCode = "";
    document.getElementById("chartArea").style.display = "none";
    document.getElementById("tvChartContainer").innerHTML = "";
    document.getElementById("emptyDetail").style.display = "flex";
    tvWidget = null;
    renderWatchlist();
}

// ---- Init ----
renderWatchlist();
</script>
</body>
</html>
