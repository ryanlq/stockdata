<!doctype html>
<html lang="zh">
    <head>
        <meta charset="UTF-8" />
        <title>自选股</title>
        <link rel="stylesheet" href="common.css" />
        <style>
            /* ---- Full-width override ---- */
            body {
                width: 100%;
            }
            .main {
                padding: unset !important;
                gap: unset !important;
                max-width: unset !important;
                width: 100% !important;
            }

            /* ---- Watchlist panel ---- */
            .watchlist-panel {
                width: 320px;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .wl-search {
                padding: 12px 16px;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
                display: flex;
                gap: 8px;
            }
            .wl-search input {
                flex: 1;
            }
            .wl-add-status {
                padding: 6px 16px;
                border-bottom: 1px solid var(--border);
                font-size: 12px;
                color: var(--text2);
                background: var(--primary-light);
                flex-shrink: 0;
                display: none;
            }
            .wl-add-status.show { display: block; }
            .wl-list {
                flex: 1;
                overflow-y: auto;
                font-size: 13px;
            }
            .wl-item {
                padding: 10px 16px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                transition: background 0.1s;
            }
            .wl-item:last-child {
                border-bottom: none;
            }
            .wl-item:hover {
                background: var(--primary-light);
            }
            .wl-item.selected {
                background: var(--primary);
                color: #fff;
            }
            .wl-item .wl-info {
                flex: 1;
                min-width: 0;
            }
            .wl-item .wl-name {
                font-weight: 600;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .wl-item .wl-meta {
                font-size: 11px;
                color: var(--text2);
                margin-top: 2px;
                display: flex;
                gap: 6px;
                align-items: center;
            }
            .wl-item.selected .wl-meta {
                color: rgba(255, 255, 255, 0.7);
            }
            .wl-item .wl-del {
                margin-left: auto;
                flex-shrink: 0;
                font-size: 12px;
                color: var(--text2);
                cursor: pointer;
                opacity: 0;
                transition: opacity 0.15s, color 0.15s;
                padding: 2px 4px;
                border-radius: 4px;
            }
            .wl-item:hover .wl-del {
                opacity: 1;
            }
            .wl-item .wl-del:hover {
                color: var(--up);
            }
            .wl-item.selected .wl-del {
                color: rgba(255, 255, 255, 0.6);
                opacity: 1;
            }
            .wl-item.selected .wl-del:hover {
                color: #fff;
            }
            .wl-empty {
                padding: 40px 20px;
                text-align: center;
                color: var(--text2);
                font-size: 14px;
            }

            /* ---- Chart (center, fills remaining) ---- */
            .detail {
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                border-radius: 0;
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
            }
            .chart-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 16px;
                background: var(--chart-bar-bg);
                font-size: 13px;
                color: var(--text2);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
            }
            .chart-bar .stock-name {
                font-weight: 600;
                color: var(--text);
                font-size: 14px;
            }
            .chart-bar button {
                padding: 3px 10px;
                font-size: 12px;
            }
            .chart-container {
                flex: 1;
                min-height: 0;
            }
            .empty-detail {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text2);
                font-size: 14px;
            }

            /* ---- Notes panel ---- */
            .notes-panel {
                height: 100%;
                width: 320px;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .notes-header {
                padding: 10px 16px;
                background: var(--chart-bar-bg);
                border-bottom: 1px solid var(--border);
                font-size: 13px;
                font-weight: 600;
                color: var(--text2);
                flex-shrink: 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .notes-header .stock-label {
                color: var(--text);
                font-weight: 700;
            }
            #notesContent {
                height: 100%;
            }
            .notes-editor {
                flex: 1;
                padding: 0;
                display: flex;
                height: 100%;
                flex-direction: column;
            }
            .notes-editor textarea {
                flex: 1;
                width: 100%;
                padding: 12px 16px;
                border: none;
                outline: none;
                resize: none;
                font-size: 13px;
                line-height: 1.6;
                font-family: inherit;
                color: var(--text);
                background: var(--card);
            }
            .notes-empty {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text2);
                font-size: 13px;
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>自选股</h1>
            <a href="index.html">← 返回首页</a>
            <a
                href="Institutional_Holdings.html"
                class="type-badge"
                style="font-size: 13px; padding: 5px 12px"
                >机构持仓</a
            >
            <div style="flex: 1"></div>
            <button
                class="theme-btn"
                onclick="toggleTheme()"
                id="themeBtn"
                title="切换主题"
            ></button>
        </div>

        <div class="main">
            <!-- col 1: watchlist -->
            <div
                class="watchlist-panel card"
                style="padding: 0; overflow: hidden; border-radius: 0"
            >
                <div class="wl-search">
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="搜索或输入代码添加..."
                        oninput="renderWatchlist()"
                        onkeydown="if(event.key==='Enter')addStock()"
                    />
                    <button onclick="addStock()" style="padding:6px 12px;font-size:12px">添加</button>
                </div>
                <div class="wl-add-status" id="addStatus"></div>
                <div class="wl-list" id="wlList"></div>
                <div class="wl-empty" id="wlEmpty">
                    暂无自选股，可从机构持仓页面添加
                </div>
            </div>

            <!-- col 2: chart -->
            <div
                class="detail card"
                style="padding: 0; overflow: hidden; border-radius: 0"
            >
                <div
                    id="chartArea"
                    style="
                        display: none;
                        flex: 1;
                        flex-direction: column;
                        min-height: 0;
                    "
                >
                    <div class="chart-bar">
                        <span class="stock-name" id="chartStockName"></span>
                        <div
                            style="display: flex; gap: 8px; align-items: center"
                        >
                            <a
                                id="f10Link"
                                href="#"
                                target="_blank"
                                class="f10-link"
                                >F10</a
                            >
                            <button onclick="deselectStock()">收起</button>
                        </div>
                    </div>
                    <div class="chart-container" id="tvChartContainer"></div>
                </div>
                <div class="empty-detail" id="emptyDetail">
                    选择左侧股票查看行情图表
                </div>
            </div>

            <!-- col 3: notes -->
            <div
                class="notes-panel card"
                style="padding: 0; overflow: hidden; border-radius: 0"
            >
                <div id="notesContent">
                    <div class="notes-empty" id="notesEmpty">
                        选择股票后记录笔记
                    </div>
                </div>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <script src="common.js"></script>
        <script src="https://s3.tradingview.com/tv.js"></script>
        <script>
            const wlList = document.getElementById("wlList");
            const searchInput = document.getElementById("searchInput");
            let selectedCode = "";
            let tvWidget = null;
            let saveTimer = null;

            // ---- Notes (getNote/saveNote from common.js) ----

            function renderNotesPanel(secucode) {
                const content = document.getElementById("notesContent");
                if (!secucode) {
                    content.innerHTML =
                        '<div class="notes-empty">选择股票后记录笔记</div>';
                    return;
                }
                const [code] = secucode.split(".");
                const note = getNote(secucode);
                content.innerHTML = `
                    <div class="notes-header">
                        <span>笔记 <span class="stock-label">${code}</span></span>
                        <span style="font-weight:400;font-size:11px" id="noteStatus"></span>
                    </div>
                    <div class="notes-editor">
                        <textarea id="noteTextarea" placeholder="在此记录分析笔记...&#10;&#10;支持多行文本，自动保存"
                            oninput="onNoteInput()">${note}</textarea>
                    </div>`;
            }

            function onNoteInput() {
                clearTimeout(saveTimer);
                const status = document.getElementById("noteStatus");
                if (status) status.textContent = "编辑中...";
                saveTimer = setTimeout(() => {
                    const textarea = document.getElementById("noteTextarea");
                    if (textarea && selectedCode) {
                        saveNote(selectedCode, textarea.value);
                        const s = document.getElementById("noteStatus");
                        if (s) s.textContent = "已保存";
                        setTimeout(() => {
                            if (s) s.textContent = "";
                        }, 1500);
                    }
                }, 500);
            }

            // ---- Toast ----
            let toastTimer;
            function showToast(msg) {
                const el = document.getElementById("toast");
                el.textContent = msg;
                el.classList.add("show");
                clearTimeout(toastTimer);
                toastTimer = setTimeout(
                    () => el.classList.remove("show"),
                    1500,
                );
            }

            // ---- Watchlist ----
            function renderWatchlist() {
                const kw = searchInput.value.trim().toLowerCase();
                let list = getWatchlist();
                if (kw)
                    list = list.filter(
                        (s) =>
                            s.name.toLowerCase().includes(kw) ||
                            s.secucode.includes(kw),
                    );

                document.getElementById("wlEmpty").style.display = list.length
                    ? "none"
                    : "block";
                wlList.innerHTML = "";

                for (const s of list) {
                    const [code] = s.secucode.split(".");
                    const board = getBoardLabel(code);
                    const div = document.createElement("div");
                    div.className =
                        "wl-item" +
                        (s.secucode === selectedCode ? " selected" : "");
                    div.innerHTML = `
                        <div class="wl-info">
                            <div class="wl-name">${s.name}</div>
                            <div class="wl-meta">
                                <span>${code}</span>
                                <span class="type-badge">${board}</span>
                            </div>
                        </div>
                        <span class="wl-del" title="删除">✕</span>`;
                    div.querySelector(".wl-del").addEventListener(
                        "click",
                        (e) => {
                            e.stopPropagation();
                            removeStock(s);
                        },
                    );
                    div.addEventListener("click", () => selectStock(s));
                    wlList.appendChild(div);
                }
            }

            function removeStock(s) {
                toggleWatchlist(s.secucode, s.name, s.market);
                showToast(`已将 ${s.name} 移出自选`);
                if (selectedCode === s.secucode) deselectStock();
                renderWatchlist();
            }

            function selectStock(s) {
                selectedCode = s.secucode;
                renderWatchlist();

                const symbol = secucodeToSymbol(s.secucode);
                if (!symbol) return;

                const [code] = s.secucode.split(".");
                document.getElementById("chartStockName").textContent =
                    `${s.name} (${code})`;
                document.getElementById("f10Link").href = codeToF10Url(
                    s.secucode,
                );
                document.getElementById("emptyDetail").style.display = "none";

                const chartArea = document.getElementById("chartArea");
                chartArea.style.display = "flex";

                const container = document.getElementById("tvChartContainer");
                container.innerHTML = "";

                tvWidget = new TradingView.widget({
                    autosize: true,
                    symbol,
                    interval: "D",
                    timezone: "Asia/Shanghai",
                    theme: getTheme(),
                    style: "1",
                    locale: "zh_CN",
                    enable_publishing: false,
                    allow_symbol_change: true,
                    container_id: "tvChartContainer",
                    hide_side_toolbar: false,
                    studies: ["MASimple@tv-basicstudies"],
                });

                renderNotesPanel(s.secucode);
            }

            function deselectStock() {
                selectedCode = "";
                document.getElementById("chartArea").style.display = "none";
                document.getElementById("tvChartContainer").innerHTML = "";
                document.getElementById("emptyDetail").style.display = "flex";
                tvWidget = null;
                renderNotesPanel(null);
                renderWatchlist();
            }

            // ---- Stock info (Tencent API) ----
            function codeToTencentKey(code) {
                const c = String(code);
                if (c.startsWith("6") || c.startsWith("900")) return "s_sh" + c;
                if (c.startsWith("8") || c.startsWith("43")) return "s_bj" + c;
                return "s_sz" + c;
            }

            function codeToMarket(code) {
                const c = String(code);
                if (c.startsWith("6") || c.startsWith("688") || c.startsWith("900")) return "SH";
                if (c.startsWith("8") || c.startsWith("43")) return "BJ";
                return "SZ";
            }

            async function fetchStockInfo(code) {
                const cacheKey = "info_" + code;
                const cached = cacheGet(cacheKey);
                if (cached) return cached;

                const key = codeToTencentKey(code);
                const resp = await fetch(`https://qt.gtimg.cn/q=${key}`);
                const text = await resp.text();
                // Parse: v_s_sh600519="1~贵州茅台~600519~1332.95~..."
                const match = text.match(/"(.+)"/);
                if (!match) return null;

                const parts = match[1].split("~");
                if (parts.length < 7) return null;

                const info = {
                    code: parts[2],
                    name: parts[1],
                    price: parseFloat(parts[3]),
                    change: parseFloat(parts[4]),
                    changePct: parseFloat(parts[5]),
                    volume: parseInt(parts[6]),
                    amount: parseFloat(parts[7]),
                    marketCap: parts[9] ? parseFloat(parts[9]) : null,
                };
                cacheSet(cacheKey, info);
                return info;
            }

            // ---- Add stock by code ----
            async function addStock() {
                const input = document.getElementById("searchInput");
                let code = input.value.trim();
                if (!code) return;
                input.value = "";

                const statusEl = document.getElementById("addStatus");
                statusEl.textContent = "查询中...";
                statusEl.classList.add("show");

                try {
                    code = code.replace(/\D/g, "");
                    if (!/^\d{6}$/.test(code)) throw new Error("请输入6位股票代码");

                    const market = codeToMarket(code);
                    const secucode = `${code}.${market}`;

                    if (isInWatchlist(secucode)) throw new Error("该股票已在自选中");

                    const info = await fetchStockInfo(code);
                    if (!info || !info.name) throw new Error("未找到该股票");

                    toggleWatchlist(secucode, info.name, market);
                    renderWatchlist();
                    showToast(`已添加 ${info.name}`);
                    statusEl.textContent = `✓ ${info.name} 已添加`;
                    statusEl.style.color = "var(--down)";
                    setTimeout(() => {
                        statusEl.classList.remove("show");
                        statusEl.style.color = "";
                    }, 1500);
                } catch (e) {
                    statusEl.textContent = e.message || "添加失败";
                    statusEl.style.color = "var(--up)";
                    setTimeout(() => {
                        statusEl.classList.remove("show");
                        statusEl.style.color = "";
                    }, 2000);
                }
            }

            // ---- Init ----
            renderWatchlist();
        </script>
    </body>
</html>
