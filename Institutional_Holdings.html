<!doctype html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>机构持仓下载器</title>
    <link rel="stylesheet" href="common.css" />
    <style>
        /* ---- Type tabs ---- */
        .type-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .type-tab {
            padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
            background: var(--card); font-size: 13px; cursor: pointer;
            transition: all .15s; color: var(--text2);
        }
        .type-tab:hover { border-color: var(--primary); color: var(--primary); }
        .type-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* ---- Search ---- */
        .search-wrap { position: relative; margin-bottom: 10px; }
        .search-wrap input { width: 100%; padding: 8px 12px 8px 32px; }
        .search-wrap::before {
            content: "🔍"; position: absolute; left: 10px; top: 50%;
            transform: translateY(-50%); font-size: 13px; pointer-events: none;
        }

        /* ---- Holder list ---- */
        .holder-list {
            border: 1px solid var(--border); border-radius: 8px;
            max-height: 260px; overflow-y: auto; font-size: 13px;
        }
        .holder-list .item {
            padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; transition: background .1s;
        }
        .holder-list .item:last-child { border-bottom: none; }
        .holder-list .item:hover { background: var(--primary-light); }
        .holder-list .item.selected { background: var(--primary); color: #fff; }
        .holder-list .item .id {
            font-size: 12px; color: var(--text2); flex-shrink: 0; margin-left: 8px;
        }
        .holder-list .item.selected .id { color: rgba(255,255,255,.7); }
        .holder-list .item.selected .type-badge {
            background: rgba(255,255,255,.2); color: rgba(255,255,255,.85);
        }
        .holder-list .name {
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            flex: 1; min-width: 0;
        }
        .holder-list .item:hover .name {
            overflow: visible; white-space: normal; word-break: break-word;
            position: relative; z-index: 1;
        }

        /* ---- Custom row ---- */
        .custom-row { display: flex; gap: 8px; align-items: center; }
        .custom-row input { flex: 1; }

        /* ---- Actions ---- */
        .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .actions select { min-width: 140px; }

        /* ---- Chart section ---- */
        .chart-section { border-bottom: 1px solid var(--border); flex-shrink: 0; display: none; }
        .chart-section.open { display: block; }

        /* ---- Table filters ---- */
        th .col-filter { display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; }
        th .col-filter select, th .col-filter button {
            padding: 3px 8px; font-size: 11px; border-radius: 4px;
            border: 1px solid var(--border); background: var(--input-bg);
            cursor: pointer; color: var(--text2);
        }
        th .col-filter select { outline: none; max-width: 80px; }
        th .col-filter select:focus { border-color: var(--primary); }
        th .col-filter button:hover { border-color: var(--primary); color: var(--primary); }
        th .col-filter button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* ---- Toast ---- */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: #fff; padding: 8px 20px;
            border-radius: 8px; font-size: 13px; z-index: 999;
            opacity: 0; transition: opacity .3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }

        /* ---- Mobile toggle button ---- */
        .panel-toggle {
            display: none;
            padding: 8px 16px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            cursor: pointer;
            color: var(--primary);
            text-align: center;
        }

        /* ---- Mobile quarter selector (hidden on desktop) ---- */
        .mobile-quarter {
            display: none;
        }

        /* ---- Mobile responsive ---- */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
                height: 52px;
                gap: 10px;
            }
            .header h1 { font-size: 16px; }
            .main {
                flex-direction: column;
                height: calc(100vh - 52px);
                overflow: hidden;
                padding: 0 !important;
            }
            .panel {
                width: 100%;
                overflow: visible;
                max-height: none;
            }
            .panel.collapsed .card {
                display: none;
            }
            .panel.collapsed .card:first-child {
                display: block;
            }
            .panel.collapsed .card:first-child .type-tabs,
            .panel.collapsed .card:first-child .search-wrap,
            .panel.collapsed .card:first-child .holder-list,
            .panel.collapsed .card:first-child .hint {
                display: none;
            }
            .panel-toggle {
                display: block;
            }
            .mobile-quarter {
                display: block;
            }
            .mobile-quarter select {
                font-size: 12px;
                padding: 3px 8px;
            }
            .content {
                border-radius: 0 !important;
                border-top: 1px solid var(--border);
                min-height: 0;
            }
            .table-wrap {
                overflow-x: auto;
            }
            .chart-container {
                height: 350px;
            }
            .holder-list {
                max-height: 200px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>机构持仓数据</h1>
    <a href="index.html">← 返回首页</a>
    <div style="flex:1"></div>
    <a href="watchlist.html" class="type-badge" style="font-size:13px;padding:5px 12px">自选股</a>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题"></button>
</div>

<div class="main">
    <div class="panel-toggle" id="panelToggle" onclick="togglePanel()">
        ▼ 展开筛选面板
    </div>
    <!-- left panel -->
    <div class="panel">
        <div class="card">
            <div class="card-title">选择机构</div>
            <div class="type-tabs" id="typeTabs">
                <div class="type-tab" data-type="fav" onclick="showFavorites(this)">★ 关注</div>
            </div>
            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="搜索机构名称或代码..." />
            </div>
            <div class="holder-list" id="holderList"></div>
            <div class="hint" id="holderHint">从机构库选择，或手动输入 ID</div>
        </div>

        <div class="card">
            <div class="card-title">自定义机构 ID</div>
            <div class="custom-row">
                <input type="text" id="customId" placeholder="输入 HOLDER_NEW，如 10429689"
                    onkeydown="if(event.key==='Enter')useCustom()" />
                <button onclick="useCustom()">使用</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">季度</div>
            <div class="actions">
                <select id="dateSelect"><option value="">-- 选择机构后自动加载 --</option></select>
            </div>
            <div class="hint">选择机构后自动加载最新季度持仓</div>
        </div>
    </div>

    <!-- right panel -->
    <div class="content card" style="padding:0;overflow:hidden">
        <div class="chart-section" id="chartSection">
            <div class="chart-bar">
                <span class="stock-name" id="chartStockName"></span>
                <div style="display:flex;gap:8px;align-items:center">
                    <a id="f10Link" href="#" target="_blank" class="f10-link">F10</a>
                    <button onclick="closeChart()">关闭图表</button>
                </div>
            </div>
            <div class="chart-container" id="tvChartContainer"></div>
        </div>
        <div class="result-header">
            <span class="info" id="resultInfo">选择机构后自动加载持仓数据</span>
            <div class="mobile-quarter">
                <select id="dateSelectMobile"><option value="">-- 季度 --</option></select>
            </div>
            <button class="btn-sm" onclick="exportCSV()" id="btnExport" style="display:none">导出 CSV</button>
        </div>
        <div class="table-wrap">
            <table id="table">
                <thead><tr>
                    <th>日期</th>
                    <th>股票</th>
                    <th>代码<div class="col-filter">
                        <select id="filterBoard" onchange="applyFilters()">
                            <option value="">全部</option><option value="main">主板</option>
                            <option value="cyb">创业板</option><option value="kcb">科创板</option>
                            <option value="bse">北交所</option><option value="b">B股</option>
                        </select>
                    </div></th>
                    <th>状态<div class="col-filter">
                        <select id="filterState" onchange="applyFilters()">
                            <option value="">全部</option><option value="新进">新进</option>
                            <option value="不变">不变</option><option value="加仓">加仓</option>
                            <option value="减仓">减仓</option><option value="平仓">平仓</option>
                        </select>
                    </div></th>
                    <th>持仓占比<div class="col-filter">
                        <button onclick="toggleSort('ratio')" id="sortBtn_ratio" title="排序">⇅</button>
                    </div></th>
                    <th>变化比例<div class="col-filter">
                        <button onclick="toggleSort('change')" id="sortBtn_change" title="排序">⇅</button>
                    </div></th>
                    <th>市值<div class="col-filter">
                        <button onclick="toggleSort('cap')" id="sortBtn_cap" title="排序">⇅</button>
                    </div></th>
                </tr></thead>
                <tbody></tbody>
            </table>
            <div class="empty" id="empty">选择机构后自动加载持仓数据</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="common.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
// ---- Mobile panel toggle ----
function togglePanel() {
    const panel = document.querySelector(".panel");
    const toggle = document.getElementById("panelToggle");
    panel.classList.toggle("collapsed");
    toggle.textContent = panel.classList.contains("collapsed")
        ? "▼ 展开筛选面板"
        : "▲ 收起筛选面板";
}

// Collapse panel by default on mobile
if (window.innerWidth <= 768) {
    document.querySelector(".panel").classList.add("collapsed");
}

const searchInput = document.getElementById("searchInput");
const holderList = document.getElementById("holderList");
const dateSelect = document.getElementById("dateSelect");
const dateSelectMobile = document.getElementById("dateSelectMobile");

// Sync the two date selects
dateSelectMobile.addEventListener("change", () => {
    dateSelect.value = dateSelectMobile.value;
    if (dateSelect.value) fetchData();
});
dateSelect.addEventListener("change", () => {
    dateSelectMobile.value = dateSelect.value;
});
const resultInfo = document.getElementById("resultInfo");
const btnExport = document.getElementById("btnExport");
const emptyEl = document.getElementById("empty");
const filterBoard = document.getElementById("filterBoard");
const filterState = document.getElementById("filterState");

let currentData = [];
let allHolders = [];
let selectedId = "";
let holderCache = {};
let sortState = { col: null, dir: 0 };

const TYPES = ["基金","QFII","券商","保险","社保","信托","国家队","个人","其他"];
const HOLDER_BASE = "https://raw.githubusercontent.com/ryanlq/stockdata/main/holders";
const API = "https://datacenter.eastmoney.com/securities/api/data/v1/get";

// ---- Toast ----
let toastTimer;
function showToast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg; el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), 1500);
}

// ---- Sort ----
const SORT_FIELDS = { ratio: "FREE_HOLDNUM_RATIO", change: "CHANGE_RATIO", cap: "HOLDER_MARKET_CAP" };

function toggleSort(col) {
    if (sortState.col === col) { sortState.dir = (sortState.dir + 1) % 3; if (sortState.dir === 0) sortState.col = null; }
    else { sortState.col = col; sortState.dir = 1; }
    for (const k of Object.keys(SORT_FIELDS)) {
        const b = document.getElementById("sortBtn_" + k);
        if (k === sortState.col) { b.textContent = sortState.dir === 1 ? "↓" : "↑"; b.classList.add("active"); }
        else { b.textContent = "⇅"; b.classList.remove("active"); }
    }
    applyFilters();
}

// ---- Filter ----
function applyFilters() {
    if (!currentData.length) return;
    let rows = currentData;
    if (filterBoard.value) rows = rows.filter(r => getBoard(r.SECURITY_CODE) === filterBoard.value);
    if (filterState.value) rows = rows.filter(r => (r.HOLDER_STATE_NEW || "") === filterState.value);
    if (sortState.col) {
        const field = SORT_FIELDS[sortState.col];
        const dir = sortState.dir === 1 ? -1 : 1;
        rows = [...rows].sort((a, b) => ((a[field] || 0) - (b[field] || 0)) * dir);
    }
    renderTable(rows);
    resultInfo.innerHTML = (() => {
        let base = `${rows.length} / ${currentData.length} 条`;
        if (rows.length < currentData.length) base += ` <span style="color:var(--primary)">已筛选</span>`;
        if (cacheGet(`data_${selectedId}_${dateSelect.value.substring(0,10)}`)) base += `<span class="cache-tag">缓存</span>`;
        return base;
    })();
}

// ---- Favorites (institutions) ----
const FAV_KEY = "stk_favorites";
function getFavs() { try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch { return []; } }
function saveFavs(l) { localStorage.setItem(FAV_KEY, JSON.stringify(l)); }

function toggleFav(h, event) {
    event.stopPropagation();
    let favs = getFavs();
    const idx = favs.findIndex(f => f.id === h.HOLDER_NEW);
    if (idx >= 0) favs.splice(idx, 1);
    else favs.push({ id: h.HOLDER_NEW, name: h.HOLDER, type: h.HOLDER_TYPE || "" });
    saveFavs(favs);
    renderList();
    showToast(idx >= 0 ? "已取消关注" : "已关注");
}

function showFavorites(btn) {
    document.querySelectorAll(".type-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    allHolders = getFavs().map(f => ({ HOLDER: f.name, HOLDER_NEW: f.id, HOLDER_TYPE: f.type || "" }));
    renderList();
}

// ---- Type tabs ----
const typeTabs = document.getElementById("typeTabs");
TYPES.forEach(t => {
    const btn = document.createElement("div");
    btn.className = "type-tab"; btn.textContent = t;
    btn.addEventListener("click", () => selectType(t, btn));
    typeTabs.appendChild(btn);
});

async function selectType(type, btn) {
    document.querySelectorAll(".type-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    if (holderCache[type]) { allHolders = holderCache[type]; renderList(); return; }
    const cached = cacheGet("holder_" + type);
    if (cached) { holderCache[type] = cached; allHolders = cached; renderList(); return; }
    try {
        resultInfo.textContent = `加载${type}列表...`;
        const resp = await fetch(`${HOLDER_BASE}/${encodeURIComponent(type)}.json`);
        const data = await resp.json();
        holderCache[type] = data; cacheSet("holder_" + type, data);
        allHolders = data; renderList();
        resultInfo.textContent = "选择机构后自动加载持仓数据";
    } catch (e) { resultInfo.textContent = "加载失败: " + e.message; }
}

function renderList() {
    const kw = searchInput.value.trim().toLowerCase();
    const list = kw ? allHolders.filter(h => h.HOLDER.toLowerCase().includes(kw) || h.HOLDER_NEW.includes(kw)) : allHolders;
    const favs = getFavs();
    holderList.innerHTML = "";
    for (const h of list) {
        const starred = favs.some(f => f.id === h.HOLDER_NEW);
        const typeTag = h.HOLDER_TYPE ? `<span class="type-badge">${h.HOLDER_TYPE}</span>` : "";
        const div = document.createElement("div");
        div.className = "item" + (h.HOLDER_NEW === selectedId ? " selected" : "");
        div.innerHTML = `<span class="star${starred ? " on" : ""}">${starred ? "★" : "☆"}</span>`
            + `<span class="name">${h.HOLDER}</span>${typeTag}<span class="id">${h.HOLDER_NEW}</span>`;
        div.querySelector(".star").addEventListener("click", e => toggleFav(h, e));
        div.addEventListener("click", e => { if (!e.target.classList.contains("star")) selectHolder(h); });
        holderList.appendChild(div);
    }
    document.getElementById("holderHint").textContent =
        kw ? `${list.length} / ${allHolders.length}` : `共 ${allHolders.length} 个机构`;
}

function selectHolder(h) {
    selectedId = h.HOLDER_NEW;
    document.querySelectorAll(".holder-list .item").forEach(el =>
        el.classList.toggle("selected", el.querySelector(".id").textContent === selectedId));
    document.getElementById("customId").value = selectedId;
    resetFilters();
    loadDates().then(() => { if (dateSelect.value) fetchData(); });
    // Collapse panel on mobile after selection
    if (window.innerWidth <= 768) {
        document.querySelector(".panel").classList.add("collapsed");
        document.getElementById("panelToggle").textContent = "▼ 展开筛选面板";
    }
}

searchInput.addEventListener("input", renderList);

function useCustom() {
    const id = document.getElementById("customId").value.trim();
    if (!id) return;
    selectedId = id;
    document.querySelectorAll(".type-tab").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".holder-list .item").forEach(el => el.classList.remove("selected"));
    resetFilters();
    loadDates().then(() => { if (dateSelect.value) fetchData(); });
}

function resetFilters() {
    filterBoard.value = ""; filterState.value = "";
    sortState = { col: null, dir: 0 };
    for (const k of Object.keys(SORT_FIELDS)) {
        const b = document.getElementById("sortBtn_" + k);
        b.textContent = "⇅"; b.classList.remove("active");
    }
}

// ---- API ----
async function loadDates() {
    if (!selectedId) return;
    const cacheKey = `dates_${selectedId}`;
    const cached = cacheGet(cacheKey);
    if (cached) { fillDates(cached); resultInfo.innerHTML = `${cached.length} 个季度<span class="cache-tag">缓存</span>`; return cached; }
    resultInfo.textContent = "加载季度列表...";
    const url = `${API}?reportName=RPT_F10_EH_FREEHOLDERS&columns=END_DATE&distinct=END_DATE`
        + `&filter=(HOLDER_NEW="${selectedId}")&sortTypes=-1&sortColumns=END_DATE&pageNumber=1&pageSize=100&source=Datacenter&client=PC&v=${Math.random()}`;
    const resp = await fetch(url);
    const rows = (await resp.json()).result?.data?.map(r => r.END_DATE) || [];
    if (!rows.length) { resultInfo.textContent = "未找到该机构的持仓季度数据"; return []; }
    cacheSet(cacheKey, rows); fillDates(rows);
    resultInfo.textContent = `${rows.length} 个季度`; return rows;
}

function fillDates(dates) {
    dateSelect.innerHTML = "";
    dateSelectMobile.innerHTML = "";
    for (const d of dates) {
        const label = d.substring(0, 10);
        const o1 = document.createElement("option"); o1.value = d; o1.textContent = label; dateSelect.appendChild(o1);
        const o2 = document.createElement("option"); o2.value = d; o2.textContent = label; dateSelectMobile.appendChild(o2);
    }
    dateSelectMobile.value = dateSelect.value;
}

dateSelect.addEventListener("change", () => { if (selectedId && dateSelect.value) fetchData(); });

async function fetchData() {
    if (!selectedId || !dateSelect.value) return;
    const endDate = dateSelect.value;
    const cacheKey = `data_${selectedId}_${endDate.substring(0,10)}`;
    const cached = cacheGet(cacheKey);
    if (cached) { currentData = cached; applyFilters(); btnExport.style.display = ""; emptyEl.style.display = "none"; return; }
    let page = 1, all = [];
    while (true) {
        resultInfo.textContent = `抓取第 ${page} 页...`;
        const url = `${API}?reportName=RPT_F10_EH_FREEHOLDERS`
            + `&columns=HOLDER_NEW,SECUCODE,SECURITY_CODE,SECURITY_NAME_ABBR,END_DATE,HOLDER_NAME,FREE_HOLDNUM_RATIO,HOLDER_MARKET_CAP,HOLDER_RANK,HOLDER_STATE_NEW,CHANGE_RATIO`
            + `&filter=(HOLDER_NEW="${selectedId}")(END_DATE='${endDate}')&pageNumber=${page}&pageSize=500&sortTypes=-1&sortColumns=FREE_HOLDNUM_RATIO&source=Datacenter&client=PC&v=${Math.random()}`;
        const rows = (await (await fetch(url)).json()).result?.data || [];
        if (!rows.length) break; all.push(...rows); if (rows.length < 500) break; page++;
    }
    currentData = all; cacheSet(cacheKey, all); applyFilters();
    btnExport.style.display = all.length ? "" : "none";
    emptyEl.style.display = all.length ? "none" : "block";
    resultInfo.textContent = `完成，共 ${all.length} 条`;
}

function renderTable(rows) {
    const tbody = document.querySelector("#table tbody"); tbody.innerHTML = "";
    for (const row of rows) {
        const pct = row.FREE_HOLDNUM_RATIO, chg = row.CHANGE_RATIO;
        const sc = row.SECUCODE || "", sn = (row.SECURITY_NAME_ABBR || "").replace(/'/g, "\\'");
        const watched = isInWatchlist(sc);
        const tr = document.createElement("tr");
        tr.innerHTML = `
        <td>${(row.END_DATE||"").substring(0,10)}</td>
        <td>${row.SECURITY_NAME_ABBR||""}</td>
        <td>
            <a class="stock-link" onclick="openChart('${sc}','${sn}')">${row.SECURITY_CODE||""}</a>
            <span class="star${watched ? " on" : ""}" onclick="toggleWatchlistRow('${sc}','${sn}',this)">${watched ? "★" : "☆"}</span>
        </td>
        <td>${row.HOLDER_STATE_NEW||""}</td>
        <td>${pct != null ? pct.toFixed(2) + "%" : ""}</td>
        <td style="color:${chg > 0 ? "var(--up)" : chg < 0 ? "var(--down)" : ""}">${chg != null ? (chg > 0 ? "+" : "") + chg.toFixed(2) : ""}</td>
        <td>${row.HOLDER_MARKET_CAP != null ? (row.HOLDER_MARKET_CAP / 1e8).toFixed(2) + "亿" : ""}</td>`;
        tbody.appendChild(tr);
    }
}

function toggleWatchlistRow(secucode, name, el) {
    const m = secucode.includes(".SH") ? "SH" : "SZ";
    const added = toggleWatchlist(secucode, name, m);
    el.textContent = added ? "★" : "☆";
    el.classList.toggle("on", added);
    showToast(added ? `已将 ${name} 加入自选` : `已将 ${name} 移出自选`);
    applyFilters(); // re-render to update star states
}

// ---- TradingView ----
let tvWidget = null, currentChartSecucode = "", currentChartName = "";

function openChart(secucode, name) {
    const symbol = secucodeToSymbol(secucode);
    if (!symbol) return;
    currentChartSecucode = secucode; currentChartName = name;
    document.getElementById("chartStockName").textContent = `${name} (${symbol.split(":")[1]})`;
    document.getElementById("f10Link").href = codeToF10Url(secucode);
    document.getElementById("chartSection").classList.add("open");
    const container = document.getElementById("tvChartContainer"); container.innerHTML = "";
    tvWidget = new TradingView.widget({
        autosize: true, symbol, interval: "D", timezone: "Asia/Shanghai",
        theme: getTheme(), style: "1", locale: "zh_CN", enable_publishing: false,
        allow_symbol_change: true, container_id: "tvChartContainer",
        hide_side_toolbar: false, studies: ["MASimple@tv-basicstudies"],
    });
}

function closeChart() {
    document.getElementById("chartSection").classList.remove("open");
    document.getElementById("tvChartContainer").innerHTML = ""; tvWidget = null;
}

// ---- Export ----
function exportCSV() {
    if (!currentData.length) return;
    const headers = Object.keys(currentData[0]);
    const csv = [headers.join(","), ...currentData.map(r => headers.map(h => `"${r[h] ?? ""}"`).join(","))].join("\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" }));
    a.download = "holder_positions.csv"; a.click();
}
</script>
